<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Vinicius Costa Germano</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-container">
        <header class="profile-header">
            <div class="profile-pic-area">
                <img src="https://via.placeholder.com/600x400" alt="Foto de perfil de Vinicius" class="profile-pic">
                
                <button class="share-btn"><i class="fas fa-reply"></i></button>
            </div>
        </header>

        <section class="profile-info">
            <h1>Vinicius Costa Germano</h1>
            <p>Designer Gráfico</p>
        </section>

        <main class="link-grid">
            
            <a href="COLE_AQUI_SEU_LINK_DO_LINKEDIN" class="grid-item linkedin" target="_blank" rel="noopener noreferrer">
                <span class="link-icon-circle"><i class="fas fa-link"></i></span>
                <h3>Meu<br>LinkedIn</h3>
            </a>
            
            <a href="COLE_AQUI_SEU_LINK_DO_BEHANCE" class="grid-item behance" target="_blank" rel="noopener noreferrer">
                <span class="link-icon-circle"><i class="fas fa-link"></i></span>
                <h3>Meu portfólio<br>no <span class="behance-text">Behance</span></h3>
            </a>

            <a href="COLE_AQUI_SEU_LINK_DO_INSTAGRAM" class="grid-item instagram" target="_blank" rel="noopener noreferrer">
                <span class="link-icon-circle"><i class="fas fa-link"></i></span>
                <h3>Meu<br><span class="instagram-text">Instagram</span></h3>
            </a>

            <a href="COLE_AQUI_SEU_LINK_DO_YOUTUBE" class="grid-item youtube" target="_blank" rel="noopener noreferrer">
                <span class="link-icon-circle"><i class="fas fa-link"></i></span>
                <h3>Meu<br>canal no <span class="youtube-text">YouTube</span></h3>
            </a>
            
        </main>
    </div>
</body>
</html>
